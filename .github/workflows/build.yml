name: Build Raft Survival Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Also allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 21 (required by NeoForge 1.21.1)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache Gradle downloads so re-builds are fast
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable (zip doesn't preserve permissions on Windows)
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # 5. Build – 'build' runs compileJava + processResources + jar
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
        env:
          # Suppresses the NeoForge Gradle "do you accept the EULA" prompt
          CI: true

      # 6. Upload the finished .jar so you can download it from the Actions tab
      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: raftmod-jar
          # NeoForge Gradle outputs to build/libs/
          path: build/libs/*.jar
          # Keep the artifact for 30 days
          retention-days: 30
